run:
  name: "sac_hedging"
  seed: 42
  total_timesteps: 2_000_000
  n_envs: 4
  progress_bar: true

environment:
  S0: 100.0
  K: 100.0
  T: 30
  r: 0.05
  sigma: 0.20
  dt: 0.003968
  kappa: 0.001
  randomise_params: true
  sigma_range: [0.10, 0.40]

eval_environment:
  randomise_params: false
  sigma: 0.20

sac:
  policy: "MlpPolicy"
  learning_rate: 3.0e-4
  buffer_size: 500_000
  learning_starts: 10_000
  batch_size: 512
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  ent_coef: "auto"
  policy_kwargs:
    net_arch: [256, 256]

vec_normalize:
  norm_obs: true
  norm_reward: true
  clip_obs: 10.0
  clip_reward: 10.0

callbacks:
  eval_freq: 50_000
  n_eval_episodes: 100
  save_freq: 100_000
  verbose: 1

paths:
  checkpoints_dir: "checkpoints"
  results_dir: "results"
  tb_log_name: "SAC"
